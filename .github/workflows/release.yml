name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "file:./based.sqlite"

      - name: Prune to production dependencies
        run: bun install --production --frozen-lockfile

      - name: Create release package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE_NAME="based-${TAG}"
          mkdir -p "${PACKAGE_NAME}"

          # App files
          cp -r .next "${PACKAGE_NAME}/"
          cp -r node_modules "${PACKAGE_NAME}/"
          cp -r prisma "${PACKAGE_NAME}/"
          cp -r public "${PACKAGE_NAME}/" 2>/dev/null || true
          cp package.json "${PACKAGE_NAME}/"
          cp next.config.ts "${PACKAGE_NAME}/"
          cp next-env.d.ts "${PACKAGE_NAME}/"
          cp tsconfig.json "${PACKAGE_NAME}/"

          # README for the package
          cat > "${PACKAGE_NAME}/README.md" << 'PKGEOF'
          # Based

          A local-first knowledge base application.

          ## Requirements

          - [Bun](https://bun.sh) v1.0+

          ## Quick Start

          ```bash
          # Install dependencies (if not bundled)
          bun install

          # Start the app
          bun run start
          ```

          The app starts at **http://localhost:3000**.

          All data is stored in `~/.based/` on your machine.

          ## What's Included

          - `prisma/schema.prisma` — database schema
          - `.next/` — built application
          - `node_modules/` — production dependencies

          ## Documentation

          See the [GitHub repository](https://github.com/2na3k/based) for API docs and architecture.
          PKGEOF

          # Remove leading spaces from heredoc
          sed -i 's/^          //' "${PACKAGE_NAME}/README.md"

          # Create zip
          zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}"

          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE_NAME }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
